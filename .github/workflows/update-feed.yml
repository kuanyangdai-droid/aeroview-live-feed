name: Update AeroView Hangzhou Schedule Feed

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: aeroview-hangzhou-schedule-feed
  cancel-in-progress: true

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate Hangzhou schedule feed JSON
        env:
          AIRLABS_API_KEY: ${{ secrets.AIRLABS_API_KEY }}
          TRACK_AIRPORT: "HGH"
          OUTPUT_PATH: "special-livery-live.json"
          META_PATH: "feed-meta.json"
          PREVIOUS_FEED_URL: "https://kuanyangdai-droid.github.io/aeroview-live-feed/special-livery-live.json"
        run: python generate_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add special-livery-live.json feed-meta.json
          if git diff --cached --quiet; then
            echo "No feed changes to commit."
          else
            git commit -m "Update Hangzhou schedule feed [skip ci]"
            git push
          fi

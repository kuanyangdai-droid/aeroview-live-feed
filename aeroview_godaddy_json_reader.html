<!--
AeroView Hangzhou Special Livery Schedule - GoDaddy JSON Reader Version
Paste this whole block into a GoDaddy Custom HTML section.
-->
<meta charset="utf-8">
<div id="aeroview-hgh-schedule"></div>
<style>
  #aeroview-hgh-schedule {
    --av-bg: #202224;
    --av-panel: rgba(255, 255, 255, 0.07);
    --av-panel-2: rgba(255, 255, 255, 0.11);
    --av-line: rgba(255, 255, 255, 0.16);
    --av-text: #f5f5f2;
    --av-muted: rgba(255, 255, 255, 0.68);
    --av-soft: rgba(255, 255, 255, 0.46);
    --av-green: #66e0a3;
    --av-blue: #8eb8ff;
    --av-gold: #d9bd73;
    --av-red: #ff7d7d;
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--av-text);
    width: 100%;
    max-width: 1040px;
    margin: 0 auto;
  }
  #aeroview-hgh-schedule .av-card {
    border-radius: 16px;
    background: linear-gradient(135deg, #292b2d, #1f2022 64%, #2b2924);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow: 0 22px 54px rgba(0,0,0,0.26);
    padding: 22px 24px 18px;
  }
  #aeroview-hgh-schedule .av-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 18px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--av-line);
  }
  #aeroview-hgh-schedule .av-kicker {
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--av-muted);
    font-size: 11px;
    font-weight: 750;
    margin-bottom: 5px;
  }
  #aeroview-hgh-schedule .av-title {
    margin: 0;
    font-size: clamp(24px, 3vw, 34px);
    line-height: 1.05;
    font-weight: 850;
  }
  #aeroview-hgh-schedule .av-subtitle {
    margin: 7px 0 0;
    color: var(--av-muted);
    font-size: 14px;
  }
  #aeroview-hgh-schedule .av-time {
    flex: 0 0 auto;
    border: 1px solid var(--av-line);
    background: var(--av-panel);
    border-radius: 999px;
    padding: 9px 12px;
    color: var(--av-text);
    font-size: 12px;
    font-weight: 750;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  #aeroview-hgh-schedule .av-status {
    display: flex;
    align-items: center;
    gap: 9px;
    margin: 14px 0 12px;
    color: var(--av-muted);
    font-size: 13px;
  }
  #aeroview-hgh-schedule .av-dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: var(--av-green);
    box-shadow: 0 0 0 5px rgba(102, 224, 163, 0.13), 0 0 18px rgba(102, 224, 163, 0.72);
    flex: 0 0 auto;
  }
  #aeroview-hgh-schedule .av-dot.av-warn {
    background: var(--av-gold);
    box-shadow: 0 0 0 5px rgba(217, 189, 115, 0.13), 0 0 18px rgba(217, 189, 115, 0.62);
  }
  #aeroview-hgh-schedule .av-dot.av-error {
    background: var(--av-red);
    box-shadow: 0 0 0 5px rgba(255, 125, 125, 0.13), 0 0 18px rgba(255, 125, 125, 0.62);
  }
  #aeroview-hgh-schedule .av-summary {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin: 0 0 12px;
  }
  #aeroview-hgh-schedule .av-stat {
    min-height: 74px;
    border-radius: 12px;
    border: 1px solid var(--av-line);
    background: rgba(0,0,0,0.22);
    padding: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  #aeroview-hgh-schedule .av-stat-value {
    font-size: 28px;
    line-height: 1;
    font-weight: 900;
  }
  #aeroview-hgh-schedule .av-stat-live .av-stat-value { color: var(--av-green); }
  #aeroview-hgh-schedule .av-controls {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
    gap: 10px;
    margin: 0 0 12px;
  }
  #aeroview-hgh-schedule .av-filter { min-width: 0; }
  #aeroview-hgh-schedule .av-filter select {
    width: 100%;
    height: 38px;
    color: var(--av-text);
    background: rgba(0,0,0,0.28);
    border: 1px solid var(--av-line);
    border-radius: 10px;
    padding: 0 10px;
    font: inherit;
    font-size: 12px;
    font-weight: 750;
    outline: none;
  }
  #aeroview-hgh-schedule .av-filter select:focus {
    border-color: rgba(102,224,163,0.58);
    box-shadow: 0 0 0 3px rgba(102,224,163,0.12);
  }
  #aeroview-hgh-schedule .av-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  #aeroview-hgh-schedule .av-row {
    min-height: 82px;
    display: grid;
    grid-template-columns: 118px 1.22fr 1.08fr 132px;
    align-items: center;
    gap: 16px;
    padding: 13px 16px;
    border-radius: 12px;
    background: linear-gradient(90deg, rgba(255,255,255,0.08), rgba(255,255,255,0.045));
    border: 1px solid rgba(255,255,255,0.08);
  }
  #aeroview-hgh-schedule .av-flight {
    font-size: 21px;
    font-weight: 850;
    letter-spacing: 0.04em;
  }
  #aeroview-hgh-schedule .av-label {
    color: var(--av-soft);
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 800;
    margin-bottom: 3px;
  }
  #aeroview-hgh-schedule .av-main { font-size: 15px; font-weight: 800; line-height: 1.24; }
  #aeroview-hgh-schedule .av-small { color: var(--av-muted); font-size: 12px; line-height: 1.35; margin-top: 2px; }
  #aeroview-hgh-schedule .av-route { font-size: 20px; font-weight: 850; letter-spacing: 0.05em; }
  #aeroview-hgh-schedule .av-pill {
    display: inline-flex;
    margin-top: 5px;
    padding: 3px 8px;
    border-radius: 999px;
    background: rgba(142,184,255,0.18);
    color: var(--av-blue);
    font-size: 10px;
    font-weight: 850;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #aeroview-hgh-schedule .av-pill.av-arrival {
    background: rgba(102,224,163,0.16);
    color: var(--av-green);
  }
  #aeroview-hgh-schedule .av-empty {
    min-height: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    color: var(--av-muted);
    border-radius: 14px;
    border: 1px solid var(--av-line);
    background: rgba(0,0,0,0.18);
  }
  #aeroview-hgh-schedule .av-empty strong { color: var(--av-text); font-size: 18px; }
  #aeroview-hgh-schedule .av-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    margin-top: 12px;
    color: var(--av-soft);
    font-size: 11px;
  }
  @media (max-width: 760px) {
    #aeroview-hgh-schedule .av-card { padding: 18px; }
    #aeroview-hgh-schedule .av-header { flex-direction: column; }
    #aeroview-hgh-schedule .av-time { align-self: flex-start; }
    #aeroview-hgh-schedule .av-summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    #aeroview-hgh-schedule .av-controls { grid-template-columns: 1fr; }
    #aeroview-hgh-schedule .av-row {
      grid-template-columns: 1fr;
      gap: 8px;
      min-height: 188px;
    }
  }
</style>
<script>
(function () {
  const CONFIG = {
    FEED_URL: "https://kuanyangdai-droid.github.io/aeroview-live-feed/special-livery-live.json",
    META_URL: "https://kuanyangdai-droid.github.io/aeroview-live-feed/feed-meta.json",
    REFRESH_MINUTES: 5,
    TIME_ZONE: "Asia/Shanghai"
  };

  const root = document.getElementById("aeroview-hgh-schedule");
  if (!root) return;

  const filterState = {
    direction: "all",
    country: "all",
    airline: "all",
    liveryCategory: "all",
    originAirport: "all",
    destinationAirport: "all"
  };

  const LIVERY_CATEGORIES = {
    star_alliance: "星空联盟涂装",
    skyteam: "天合联盟涂装",
    oneworld: "寰宇一家涂装",
    other: "其他类型涂装"
  };

  function esc(value) {
    return String(value == null ? "" : value).replace(/[&<>'"]/g, function (c) {
      return {"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c];
    });
  }

  function formatTime(value) {
    if (!value) return "--";
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return esc(value);
    return new Intl.DateTimeFormat("en-US", {
      timeZone: CONFIG.TIME_ZONE,
      hour: "2-digit",
      minute: "2-digit",
      hour12: false,
      month: "short",
      day: "2-digit"
    }).format(date).replace(",", "");
  }

  function formatNow() {
    return new Intl.DateTimeFormat("en-US", {
      timeZone: CONFIG.TIME_ZONE,
      month: "short",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      hour12: false
    }).format(new Date()).replace(",", "") + " CST";
  }

  function airportLabel(item, field) {
    const code = item[field] || "---";
    const embedded = field === "origin" ? item.origin_airport : item.destination_airport;
    const name = embedded && embedded.name ? embedded.name : code;
    return code + (name && name !== code ? " · " + name : "");
  }

  function airportCountry(item, field) {
    const embedded = field === "origin" ? item.origin_airport : item.destination_airport;
    return (embedded && embedded.country) || "";
  }

  function normalizeLiveryCategory(item) {
    if (item.livery_category && LIVERY_CATEGORIES[item.livery_category]) return item.livery_category;
    const text = String(item.livery || "").toLowerCase();
    if (text.indexOf("star alliance") >= 0) return "star_alliance";
    if (text.indexOf("skyteam") >= 0 || text.indexOf("sky team") >= 0) return "skyteam";
    if (text.indexOf("oneworld") >= 0 || text.indexOf("one world") >= 0) return "oneworld";
    return "other";
  }

  function uniqueSorted(values) {
    return Array.from(new Set(values)).sort(function (a, b) { return String(a).localeCompare(String(b)); });
  }

  function optionHtml(value, label, selectedValue) {
    return `<option value="${esc(value)}"${value === selectedValue ? " selected" : ""}>${esc(label)}</option>`;
  }

  function applyFilters(items) {
    return items.filter(function (item) {
      if (filterState.direction !== "all" && item.direction !== filterState.direction) return false;
      if (filterState.country !== "all" && airportCountry(item, "origin") !== filterState.country && airportCountry(item, "destination") !== filterState.country) return false;
      if (filterState.airline !== "all" && item.airline !== filterState.airline) return false;
      if (filterState.liveryCategory !== "all" && normalizeLiveryCategory(item) !== filterState.liveryCategory) return false;
      if (filterState.originAirport !== "all" && item.origin !== filterState.originAirport) return false;
      if (filterState.destinationAirport !== "all" && item.destination !== filterState.destinationAirport) return false;
      return true;
    });
  }

  function filterControls(items) {
    const countries = uniqueSorted(items.flatMap(function (item) {
      return [airportCountry(item, "origin"), airportCountry(item, "destination")];
    }).filter(Boolean));
    const airlines = uniqueSorted(items.map(function (item) { return item.airline; }).filter(Boolean));
    const origins = uniqueSorted(items.map(function (item) { return item.origin ? item.origin + "|" + airportLabel(item, "origin") : ""; }).filter(Boolean));
    const destinations = uniqueSorted(items.map(function (item) { return item.destination ? item.destination + "|" + airportLabel(item, "destination") : ""; }).filter(Boolean));

    return `
      <div class="av-controls">
        <label class="av-filter">
          <div class="av-label">Direction</div>
          <select data-av-filter="direction">
            ${optionHtml("all", "All HGH flights", filterState.direction)}
            ${optionHtml("arrival", "Arrivals to HGH", filterState.direction)}
            ${optionHtml("departure", "Departures from HGH", filterState.direction)}
          </select>
        </label>
        <label class="av-filter">
          <div class="av-label">Country</div>
          <select data-av-filter="country">
            ${optionHtml("all", "All countries", filterState.country)}
            ${countries.map(function (country) { return optionHtml(country, country, filterState.country); }).join("")}
          </select>
        </label>
        <label class="av-filter">
          <div class="av-label">Airline</div>
          <select data-av-filter="airline">
            ${optionHtml("all", "All airlines", filterState.airline)}
            ${airlines.map(function (airline) { return optionHtml(airline, airline, filterState.airline); }).join("")}
          </select>
        </label>
        <label class="av-filter">
          <div class="av-label">Livery Type</div>
          <select data-av-filter="liveryCategory">
            ${optionHtml("all", "All livery types", filterState.liveryCategory)}
            ${Object.keys(LIVERY_CATEGORIES).map(function (key) { return optionHtml(key, LIVERY_CATEGORIES[key], filterState.liveryCategory); }).join("")}
          </select>
        </label>
        <label class="av-filter">
          <div class="av-label">Origin</div>
          <select data-av-filter="originAirport">
            ${optionHtml("all", "All origins", filterState.originAirport)}
            ${origins.map(function (value) {
              const parts = value.split("|");
              return optionHtml(parts[0], parts.slice(1).join("|"), filterState.originAirport);
            }).join("")}
          </select>
        </label>
        <label class="av-filter">
          <div class="av-label">Arrival</div>
          <select data-av-filter="destinationAirport">
            ${optionHtml("all", "All arrivals", filterState.destinationAirport)}
            ${destinations.map(function (value) {
              const parts = value.split("|");
              return optionHtml(parts[0], parts.slice(1).join("|"), filterState.destinationAirport);
            }).join("")}
          </select>
        </label>
      </div>`;
  }

  function summaryBar(items, filtered) {
    const arrivalCount = items.filter(function (item) { return item.direction === "arrival"; }).length;
    const departureCount = items.filter(function (item) { return item.direction === "departure"; }).length;
    return `
      <div class="av-summary">
        <div class="av-stat av-stat-live">
          <div class="av-label">Live Livery Count</div>
          <div class="av-stat-value">${items.length}</div>
        </div>
        <div class="av-stat">
          <div class="av-label">Shown</div>
          <div class="av-stat-value">${filtered.length}</div>
        </div>
        <div class="av-stat">
          <div class="av-label">Arrivals</div>
          <div class="av-stat-value">${arrivalCount}</div>
        </div>
        <div class="av-stat">
          <div class="av-label">Departures</div>
          <div class="av-stat-value">${departureCount}</div>
        </div>
      </div>`;
  }

  function flightRow(item) {
    const isArrival = item.direction === "arrival";
    const directionLabel = isArrival ? "Arrival to HGH" : "Departure from HGH";
    const directionClass = isArrival ? " av-arrival" : "";
    const scheduled = item.scheduled_time || (isArrival ? item.scheduled_arrival : item.scheduled_departure) || item.updated;
    return `
      <div class="av-row">
        <div>
          <div class="av-flight">${esc(item.flight || "SCHED")}</div>
          <span class="av-pill${directionClass}">${esc(directionLabel)}</span>
        </div>
        <div>
          <div class="av-label">Livery / Aircraft</div>
          <div class="av-main">${esc(item.livery || "Special Livery")}</div>
          <div class="av-small">${esc(item.airline || "")} · ${esc(item.aircraft || "")} · ${esc(item.registration || "")}</div>
        </div>
        <div>
          <div class="av-label">Planned Route</div>
          <div class="av-route">${esc(item.origin || "---")} → ${esc(item.destination || "---")}</div>
          <div class="av-small">${esc(airportLabel(item, "origin"))} → ${esc(airportLabel(item, "destination"))}</div>
        </div>
        <div>
          <div class="av-label">Last Seen</div>
          <div class="av-main">${formatTime(scheduled)} CST</div>
          <div class="av-small">${esc(item.status || "scheduled")}</div>
        </div>
      </div>`;
  }

  function shell(statusText, dotClass, bodyHtml, footerLeft, footerRight) {
    root.innerHTML = `
      <div class="av-card">
        <div class="av-header">
          <div>
            <div class="av-kicker">AeroView HGH Schedule</div>
            <h2 class="av-title">HANGZHOU SPECIAL LIVERY LIST</h2>
            <p class="av-subtitle">本日杭州进出港实时航班中，已给出注册号并命中特殊涂装库的航班</p>
          </div>
          <div class="av-time">${formatNow()}</div>
        </div>
        <div class="av-status"><span class="av-dot ${dotClass || ""}"></span><span>${esc(statusText)}</span></div>
        ${bodyHtml}
        <div class="av-footer"><span>${esc(footerLeft || "")}</span><span>${esc(footerRight || "")}</span></div>
      </div>`;
  }

  function bindFilters(items, meta) {
    root.querySelectorAll("[data-av-filter]").forEach(function (select) {
      select.addEventListener("change", function () {
        filterState[select.getAttribute("data-av-filter")] = select.value;
        renderFeed(items, meta);
      });
    });
  }

  function renderLoading() {
    shell("Loading Hangzhou live feed...", "av-warn", `<div class="av-empty"><strong>Loading live feed</strong><span>正在读取公开 JSON 数据。</span></div>`, "GitHub Pages JSON mode", "Auto refresh enabled");
  }

  function renderError(message) {
    shell("Live feed unavailable", "av-error", `<div class="av-empty"><strong>Feed loading failed</strong><span>${esc(message)}</span></div>`, "请检查 GitHub Pages feed 地址", "Refresh: " + CONFIG.REFRESH_MINUTES + " min");
  }

  function renderEmpty(meta) {
    const generated = meta && meta.generated_at ? "Feed generated: " + formatTime(meta.generated_at) + " CST" : "No matched live rows";
    shell("Live feed loaded · No Hangzhou special livery match", "av-warn", `<div class="av-empty"><strong>No matched aircraft right now</strong><span>当前杭州进出港实时数据中暂未发现已给出注册号且命中特殊涂装库的航班。</span></div>`, generated, "Live registrations only");
  }

  function renderFeed(items, meta) {
    const filtered = applyFilters(items);
    const rows = filtered.map(flightRow).join("");
    const generated = meta && meta.generated_at ? "Feed generated: " + formatTime(meta.generated_at) + " CST" : "GitHub JSON feed";
    const dateText = meta && meta.schedule_date ? "Schedule date: " + meta.schedule_date : "Hangzhou HGH";
    const list = filtered.length ? `<div class="av-list">${rows}</div>` : `<div class="av-empty"><strong>No aircraft in this filter</strong><span>Try another direction, airline, livery, origin, or arrival filter.</span></div>`;
    const body = summaryBar(items, filtered) + filterControls(items) + list;
    shell("Live feed loaded · " + filtered.length + " of " + items.length + " matches shown", "", body, generated, dateText);
    bindFilters(items, meta);
  }

  async function fetchJson(url) {
    const response = await fetch(url + (url.indexOf("?") >= 0 ? "&" : "?") + "_=" + Date.now(), { cache: "no-store" });
    if (!response.ok) throw new Error("HTTP " + response.status + " while loading " + url);
    return response.json();
  }

  async function update() {
    try {
      const feed = await fetchJson(CONFIG.FEED_URL);
      let meta = null;
      try { meta = await fetchJson(CONFIG.META_URL); } catch (e) { meta = null; }
      if (!Array.isArray(feed)) throw new Error("Feed JSON must be an array");
      if (!feed.length) renderEmpty(meta);
      else renderFeed(feed, meta);
    } catch (error) {
      renderError(error && error.message ? error.message : String(error));
    }
  }

  renderLoading();
  update();
  window.setInterval(update, Math.max(1, CONFIG.REFRESH_MINUTES) * 60 * 1000);
})();
</script>
